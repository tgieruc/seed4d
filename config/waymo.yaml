BEVCamera: true
large_vehicles: false
invisible_ego: true
invisible_all: false
3Dboundingbox: true
sort_spawnpoints: true
other_vehicles_have_sensors: false
carla:
  fixed_delta_seconds: 0.008894182
  host: localhost
  port: 2000
  synchronous_mode: true
  timeout: 40.0
data_dir: data
dataset:
  nuscenes_lidar:
    attached_to_vehicle: true
    sensor_info:
      channels: 32
      points_per_second: 360000
      rotation_frequency: 120
      range: 20
      type:
      - sensor.lidar.ray_cast
    transform_file_lidar: lidar/nuscenes/nuscenes_adjusted.json
  nuscenes:
    attached_to_vehicle: true
    sensor_info:
      fov: 60
      height: 1280
      width: 1920
      type:
      - sensor.camera.rgb
      - sensor.camera.semantic_segmentation
      - sensor.camera.instance_segmentation
      - sensor.camera.depth
    transform_file_cams: camera/waymo/waymo.json
  sphere:
    attached_to_vehicle: true
    sensor_info:
      fov: 90
      height: 600
      width: 800
      type:
      - sensor.camera.rgb
      - sensor.camera.semantic_segmentation
      - sensor.camera.instance_segmentation
      - sensor.camera.depth
    transform_file_cams: camera/sphere/sphere.json
map: Town01
min_distance: 0.0
number_of_vehicles: 1
number_of_walkers: 20
spawn_point:
- 1
steps: 1
vehicle: vehicle.audi.tt
weather: Default